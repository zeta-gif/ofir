<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Juegos por Grados</title>
  <link rel="icon" type="image/png" href="img/favicon.png">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&family=Rubik+Mono+One&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Fredoka', sans-serif;
      background-color: #ffde59;
      background-image: 
        linear-gradient(rgba(0, 0, 0, 0.04) 2px, transparent 2px),
        linear-gradient(90deg, rgba(0, 0, 0, 0.04) 2px, transparent 2px);
      background-size: 40px 40px;
      background-position: center;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
      overflow-x: hidden;
    }

    .comic-box {
      background: #ffffff;
      width: 100%;
      max-width: 900px;
      padding: 55px 45px;
      border-radius: 32px;
      border: 5px solid #1a1a1a;
      box-shadow: 12px 12px 0px #1a1a1a;
      position: relative;
      transform: rotate(-0.5deg);
    }

    .badge-sticker {
      position: absolute;
      top: -25px;
      left: 50%;
      transform: translateX(-50%) rotate(2deg);
      background: #26de81;
      color: #1a1a1a;
      padding: 10px 24px;
      font-family: 'Rubik Mono One', monospace;
      font-size: 1.1rem;
      border: 4px solid #1a1a1a;
      border-radius: 16px;
      box-shadow: 5px 5px 0px #1a1a1a;
    }

    h1 {
      font-family: 'Rubik Mono One', monospace;
      font-size: clamp(1.6rem, 5vw, 2.4rem);
      color: #1a1a1a;
      margin-top: 15px;
      margin-bottom: 15px;
      line-height: 1.2;
      text-align: center;
    }

    .subtitle {
      font-size: 1.25rem;
      color: #4a4a4a;
      font-weight: 600;
      max-width: 600px;
      margin: 0 auto 40px;
      line-height: 1.4;
      text-align: center;
    }

    .grades-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 28px;
    }

    .grade-card {
      background: #ffffff;
      border: 4px solid #1a1a1a;
      border-radius: 24px;
      padding: 24px;
      box-shadow: 8px 8px 0px #1a1a1a;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .grade-header {
      display: flex;
      align-items: center;
      gap: 14px;
      font-size: 1.4rem;
      font-weight: 700;
      padding-bottom: 10px;
      border-bottom: 3px dashed #1a1a1a;
    }

    .grade-badge {
      width: 46px;
      height: 46px;
      border: 3px solid #1a1a1a;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      color: white;
      font-family: 'Rubik Mono One', monospace;
      box-shadow: 3px 3px 0px #1a1a1a;
    }

    .g1 .grade-badge { background: #ff6b81; }
    .g2 .grade-badge { background: #b388ff; }
    .g3 .grade-badge { background: #ff9f43; }
    .g4 .grade-badge { background: #45aaf2; }
    .g5 .grade-badge { background: #26de81; }
    .g6 .grade-badge { background: #fd9644; }

    .links-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      flex-grow: 1;
    }

    .game-link {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      background: #f8f9fa;
      border: 3px solid #1a1a1a;
      border-radius: 14px;
      color: #1a1a1a;
      text-decoration: none;
      font-size: 1.1rem;
      font-weight: 700;
      box-shadow: 4px 4px 0px #1a1a1a;
      transition: all 0.1s ease-out;
    }

    .game-link:hover {
      transform: scale(1.02) translateY(-2px);
      background: #ffffff;
    }

    .game-link:active {
      transform: translateY(4px) translateX(4px);
      box-shadow: 0px 0px 0px #1a1a1a;
    }

    .game-link::before {
      content: "🕹️";
      margin-right: 10px;
      font-size: 1.2rem;
    }

    .back-container {
      margin-top: 45px;
      text-align: center;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 18px 32px;
      background: #ff5757;
      color: white;
      text-decoration: none;
      border-radius: 20px;
      font-size: 1.25rem;
      font-weight: 700;
      border: 4px solid #1a1a1a;
      box-shadow: 6px 6px 0px #1a1a1a;
      transition: all 0.15s ease-out;
    }

    .back-btn:hover {
      transform: scale(1.03) translateY(-2px);
    }

    .back-btn:active {
      transform: translateY(6px) translateX(6px);
      box-shadow: 0px 0px 0px #1a1a1a;
    }

    @media (max-width: 768px) {
      .grades-grid { grid-template-columns: 1fr; gap: 24px; }
    }

    @media (max-width: 680px) {
      body { padding: 30px 12px; }
      .comic-box { padding: 45px 20px; border-radius: 24px; transform: none; }
      .badge-sticker { font-size: 0.9rem; padding: 8px 18px; width: 85%; text-align: center; }
      h1 { font-size: 1.4rem; margin-top: 20px; }
      .subtitle { font-size: 1.1rem; margin-bottom: 30px; }
      .grade-card { padding: 18px; }
      .grade-header { font-size: 1.2rem; }
      .game-link { font-size: 1rem; }
      .back-btn { width: 100%; padding: 15px; font-size: 1.15rem; }
    }
  </style>
</head>
<body>

  <main class="comic-box">
    
    <div class="badge-sticker">¡A JUGAR!</div>

    <h1>JUEGOS EDUCATIVOS</h1>
    <p class="subtitle">¡Selecciona tu grado escolar y comienza a divertirte con todos los juegos que preparamos para ti!</p>

    <div class="grades-grid">
      
      <div class="grade-card g1">
        <div class="grade-header">
          <div class="grade-badge">1°</div>
          Primer Grado
        </div>
        <div class="links-list">
          <a href="#" target="_blank" class="game-link">Iniciar</a>
         
        </div>
      </div>

      <div class="grade-card g2">
        <div class="grade-header">
          <div class="grade-badge">2°</div>
          Segundo Grado
        </div>
        <div class="links-list">
          <a href="#" target="_blank" class="game-link">Iniciar</a>
         
        </div>
      </div>

      <div class="grade-card g3">
        <div class="grade-header">
          <div class="grade-badge">3°</div>
          Tercer Grado
        </div>
        <div class="links-list">
          <a href="#" target="_blank" class="game-link">Iniciar</a>
         
        </div>
      </div>

      <div class="grade-card g4">
        <div class="grade-header">
          <div class="grade-badge">4°</div>
          Cuarto Grado
        </div>
        <div class="links-list">
          <a href="#" target="_blank" class="game-link">Iniciar</a>
         
        </div>
      </div>

      <div class="grade-card g5">
        <div class="grade-header">
          <div class="grade-badge">5°</div>
          Quinto Grado
        </div>
        <div class="links-list">
          <a href="#" target="_blank" class="game-link">Iniciar</a>
       
        </div>
      </div>

      <div class="grade-card g6">
        <div class="grade-header">
          <div class="grade-badge">6°</div>
          Sexto Grado
        </div>
        <div class="links-list">
          <a href="#" target="_blank" class="game-link">Iniciar</a>
  
        </div>
      </div>

    </div>

    <div class="back-container">
      <a href="index.html" class="back-btn">
        ⬅️ Volver al Inicio
      </a>
    </div>

  </main>

</body>
</html>
